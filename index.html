<style>
  :root{
    --red:#E10600; --black:#0B0B0D; --panel:#16161B; --panel2:#1F1F26;
    --line:#2A2A31; --line2:#3A3A42; --white:#F4F4F1; --muted:#9A9AA0; --faint:#5E5E66;
    --cond:'Saira Condensed',-apple-system,'Oswald',Impact,sans-serif;
    --body:'Saira',-apple-system,'Work Sans',system-ui,sans-serif;
    --sidebar-w:320px; --topbar-h:60px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--black);color:var(--white);font-family:var(--body);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .cond{font-family:var(--cond)}

  /* ---------- TOP BAR ---------- */
  .topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);background:var(--black);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:20px;padding:0 20px;z-index:50}
  .brand{display:flex;align-items:baseline;gap:2px;font-family:var(--cond);font-weight:800;font-size:26px;letter-spacing:.5px;text-decoration:none;white-space:nowrap}
  .brand .slash{color:var(--red);letter-spacing:-2px;margin-left:4px}
  .brand small{font-family:var(--cond);font-weight:600;font-size:11px;letter-spacing:3px;color:var(--muted);margin-left:8px;align-self:center}
  .course-tabs{display:flex;gap:6px;margin-left:auto}
  .course-tabs button{font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:14px;
    background:transparent;color:var(--muted);border:1px solid var(--line);padding:7px 16px;border-radius:2px;cursor:pointer;transition:.15s}
  .course-tabs button:hover{color:var(--white);border-color:var(--line2)}
  .course-tabs button.active{background:var(--red);color:#fff;border-color:var(--red)}
  .menu-btn{display:none;background:transparent;border:1px solid var(--line);color:var(--white);width:38px;height:38px;border-radius:2px;font-size:18px;cursor:pointer}

  /* ---------- LAYOUT ---------- */
  .layout{display:flex;padding-top:var(--topbar-h);min-height:100vh}
  .sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);
    position:fixed;top:var(--topbar-h);bottom:0;left:0;overflow-y:auto;padding:18px 0 60px}
  .sidebar::-webkit-scrollbar{width:8px}.sidebar::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}

  .progress-wrap{padding:0 20px 16px;margin-bottom:8px;border-bottom:1px solid var(--line)}
  .progress-wrap .plabel{font-family:var(--cond);text-transform:uppercase;letter-spacing:1.5px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:8px}
  .progress-track{height:5px;background:var(--line);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:var(--red);width:0;transition:width .4s ease}
  .reset-btn{background:none;border:none;color:var(--faint);font-family:var(--body);font-size:11px;cursor:pointer;margin-top:10px;text-decoration:underline}
  .reset-btn:hover{color:var(--muted)}

  .module{margin-top:4px}
  .module-head{font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.6px;font-size:15px;color:var(--white);
    padding:12px 20px 6px;display:flex;align-items:center;gap:8px}
  .module-head .mnum{color:var(--red);font-size:13px}
  .lesson{display:flex;align-items:center;gap:10px;padding:9px 20px 9px 30px;cursor:pointer;font-size:14.5px;color:var(--muted);border-left:2px solid transparent;transition:.12s}
  .lesson:hover{color:var(--white);background:var(--panel2)}
  .lesson.active{color:var(--white);background:var(--panel2);border-left-color:var(--red)}
  .lesson .tick{width:16px;height:16px;border:1.5px solid var(--line2);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent}
  .lesson.done .tick{background:var(--red);border-color:var(--red);color:#fff}
  .lesson.done{color:var(--white)}

  /* ---------- MAIN ---------- */
  .main{margin-left:var(--sidebar-w);flex:1;padding:44px 56px 90px;max-width:920px}
  .home{max-width:none}

  .eyebrow{font-family:var(--cond);text-transform:uppercase;letter-spacing:2.5px;font-size:13px;color:var(--red);font-weight:700;margin-bottom:10px}
  .eyebrow .slash{letter-spacing:-2px;margin-right:6px}
  h1.lesson-title{font-family:var(--cond);font-weight:800;text-transform:uppercase;font-size:clamp(30px,4vw,44px);line-height:1.02;letter-spacing:.5px;margin-bottom:22px}
  .lesson-body h2{font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.5px;font-size:22px;margin:30px 0 10px;color:var(--white)}
  .lesson-body h3{font-family:var(--cond);font-weight:600;text-transform:uppercase;letter-spacing:.8px;font-size:16px;margin:22px 0 6px;color:var(--muted)}
  .lesson-body p{margin:0 0 14px;color:#DBDBD8}
  .lesson-body ul,.lesson-body ol{margin:0 0 16px;padding-left:22px}
  .lesson-body li{margin-bottom:7px;color:#DBDBD8}
  .lesson-body strong{color:var(--white);font-weight:600}
  .lesson-body code{background:var(--panel2);border:1px solid var(--line);border-radius:3px;padding:1px 6px;font-size:13px;font-family:'Saira Semi Condensed',var(--body);color:#fff}

  .callout{border-left:3px solid var(--line2);background:var(--panel);padding:14px 18px;margin:18px 0;border-radius:0 3px 3px 0}
  .callout .clabel{font-family:var(--cond);text-transform:uppercase;letter-spacing:1.2px;font-size:12.5px;font-weight:700;display:block;margin-bottom:5px}
  .callout p{margin:0;font-size:14.5px}
  .callout p+p{margin-top:8px}
  .callout.bdv{border-left-color:var(--red);background:linear-gradient(90deg,rgba(225,6,0,.09),transparent 70%),var(--panel)}
  .callout.bdv .clabel{color:var(--red)}
  .callout.watch{border-left-color:#E0A800}
  .callout.watch .clabel{color:#E7B93a}
  .callout.tip{border-left-color:#6E6E78}
  .callout.tip .clabel{color:var(--muted)}
  .callout.check{border-left-color:#3BA55C}
  .callout.check .clabel{color:#57C77D}
  .callout.rule{border-left-color:var(--red);background:var(--panel)}
  .callout.rule .clabel{color:var(--red)}

  .lesson-foot{display:flex;align-items:center;gap:14px;margin-top:40px;padding-top:26px;border-top:1px solid var(--line);flex-wrap:wrap}
  .btn{font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:14px;padding:12px 22px;border-radius:2px;cursor:pointer;border:1px solid var(--line2);background:transparent;color:var(--white);transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
  .btn:hover{border-color:var(--muted)}
  .btn.primary{background:var(--red);border-color:var(--red);color:#fff}
  .btn.primary.done{background:transparent;border-color:var(--red);color:var(--red)}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.ghost{margin-left:auto}
  .nav-btns{display:flex;gap:10px;margin-left:auto}

  /* ---------- HOME ---------- */
  .hero{padding:20px 0 10px}
  .hero .eyebrow{font-size:14px}
  .hero h1{font-family:var(--cond);font-weight:800;text-transform:uppercase;font-size:clamp(38px,6vw,68px);line-height:.98;letter-spacing:.5px;margin:6px 0 16px}
  .hero h1 .red{color:var(--red)}
  .hero p.lead{font-size:18px;color:var(--muted);max-width:640px;margin-bottom:8px}
  .course-cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:36px}
  .ccard{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:26px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
  .ccard:hover{border-color:var(--red);transform:translateY(-2px)}
  .ccard .tag{font-family:var(--cond);text-transform:uppercase;letter-spacing:2px;font-size:12px;font-weight:700;color:var(--red)}
  .ccard h3{font-family:var(--cond);font-weight:800;text-transform:uppercase;font-size:30px;line-height:1;margin:8px 0 10px}
  .ccard p{color:var(--muted);font-size:14.5px;margin-bottom:18px}
  .ccard .meta{font-family:var(--cond);text-transform:uppercase;letter-spacing:1px;font-size:12.5px;color:var(--faint);display:flex;gap:16px;border-top:1px solid var(--line);padding-top:14px}
  .ccard .go{margin-top:16px;font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--white);font-size:14px}
  .ccard .go .slash{color:var(--red)}
  .home-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:40px}
  .strip-item{background:var(--panel);border:1px solid var(--line);border-radius:3px;padding:16px}
  .strip-item .st{font-family:var(--cond);text-transform:uppercase;letter-spacing:.5px;font-weight:700;font-size:15px;margin-bottom:3px}
  .strip-item .sd{font-size:13px;color:var(--muted)}

  footer{margin-left:var(--sidebar-w);border-top:1px solid var(--line);padding:22px 56px;color:var(--faint);font-size:12.5px}
  footer .wa{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--line2)}
  footer .tm{margin-top:8px;line-height:1.5}

  .overlay{display:none;position:fixed;inset:var(--topbar-h) 0 0;background:rgba(0,0,0,.6);z-index:39}

  @media(max-width:900px){
    :root{--sidebar-w:290px}
    .main{margin-left:0;padding:30px 22px 70px}
    footer{margin-left:0;padding:22px}
    .menu-btn{display:block}
    .sidebar{transform:translateX(-100%);transition:transform .25s ease;z-index:40;box-shadow:none}
    body.nav-open .sidebar{transform:translateX(0)}
    body.nav-open .overlay{display:block}
    .brand small{display:none}
    .course-tabs button{padding:6px 11px;font-size:12.5px}
    .course-cards{grid-template-columns:1fr}
    .home-strip{grid-template-columns:1fr 1fr}
  }

  .brand{align-items:center}
  .brand-logo{height:30px;width:auto;display:block}
  .hero-logo{height:58px;width:auto;margin-bottom:20px;display:block}
  @media(max-width:900px){.brand-logo{height:25px}.hero-logo{height:42px}}
</style>
</head>

const state={course:null,lesson:null};
const KEY="bdv_academia_progress_v1";
function loadProg(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}}
function saveProg(p){try{localStorage.setItem(KEY,JSON.stringify(p))}catch(e){}}
let progress=loadProg();

function allLessons(cid){const out=[];COURSES[cid].modules.forEach((m,mi)=>m.lessons.forEach((l,li)=>out.push({...l,mi,li,cid})));return out;}
function isDone(cid,id){return !!(progress[cid]&&progress[cid][id]);}
function courseProgress(cid){const ls=allLessons(cid);if(!ls.length)return 0;const d=ls.filter(l=>isDone(cid,l.id)).length;return Math.round(d/ls.length*100);}

function renderSidebar(){
  const c=COURSES[state.course];const ls=allLessons(state.course);
  const done=ls.filter(l=>isDone(state.course,l.id)).length;
  let h=`<div class="progress-wrap">
    <div class="plabel"><span>${c.tag}</span><span>${done}/${ls.length}</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${courseProgress(state.course)}%"></div></div>
    <button class="reset-btn" onclick="resetCourse()">Reiniciar progreso</button>
  </div>`;
  c.modules.forEach((m,mi)=>{
    h+=`<div class="module"><div class="module-head"><span class="mnum">${String(mi+1).padStart(2,'0')}</span>${m.title}</div>`;
    m.lessons.forEach(l=>{
      const dn=isDone(state.course,l.id)?'done':'';
      const ac=(state.lesson&&state.lesson.id===l.id)?'active':'';
      h+=`<div class="lesson ${dn} ${ac}" onclick="openLesson('${l.id}')"><span class="tick">✓</span><span>${l.title}</span></div>`;
    });
    h+=`</div>`;
  });
  document.getElementById('sidebar').innerHTML=h;
}

function renderLesson(){
  const l=state.lesson;const ls=allLessons(state.course);
  const idx=ls.findIndex(x=>x.id===l.id);
  const prev=ls[idx-1],next=ls[idx+1];
  const done=isDone(state.course,l.id);
  let h=`<div class="eyebrow"><span class="slash">///</span>${l.module}</div>
    <h1 class="lesson-title">${l.title}</h1>
    <div class="lesson-body">${l.html}</div>
    <div class="lesson-foot">
      <button class="btn primary ${done?'done':''}" onclick="toggleDone('${l.id}')">${done?'✓ Completada':'Marcar como completada'}</button>
      <div class="nav-btns">
        ${prev?`<button class="btn" onclick="openLesson('${prev.id}')">← Anterior</button>`:''}
        ${next?`<button class="btn" onclick="openLesson('${next.id}')">Siguiente →</button>`:`<button class="btn primary" onclick="openCourse('${state.course==='basico'?'avanzado':'basico'}')">${state.course==='basico'?'Ir al Avanzado →':'Volver al inicio →'}</button>`}
      </div>
    </div>`;
  const m=document.getElementById('main');m.classList.remove('home');m.innerHTML=h;m.scrollTop=0;window.scrollTo(0,0);
}

function renderHome(){
  const bp=courseProgress('basico'),ap=courseProgress('avanzado');
  const m=document.getElementById('main');m.classList.add('home');
  m.innerHTML=`
   <div class="hero">
     <img class="hero-logo" src="${LOGO}" alt="BDV Performance">
     <div class="eyebrow"><span class="slash">///</span>Academia BDV Performance</div>
     <h1>APRENDÉ A <span class="red">MANEJAR</span><br>EL CEREBRO DE TU MOTOR.</h1>
     <p class="lead">TunerStudio es donde ponés a punto tu ECU. Acá te enseñamos a usarlo con tu BDV — del primer arranque a la competición. Sin vueltas, todo aplicado a tus productos.</p>
   </div>
   <div class="course-cards">
     ${['basico','avanzado'].map(cid=>{
       const c=COURSES[cid];const ls=allLessons(cid);const pr=courseProgress(cid);
       return `<div class="ccard" onclick="openCourse('${cid}')">
         <div class="tag">${c.tag}</div>
         <h3>${c.title}</h3>
         <p>${c.sub}</p>
         <div class="meta"><span>${c.modules.length} módulos</span><span>${ls.length} lecciones</span>${pr>0?`<span style="color:var(--red)">${pr}% hecho</span>`:''}</div>
         <div class="go">${pr>0?'Seguir':'Empezar'} <span class="slash">///</span></div>
       </div>`;
     }).join('')}
   </div>
   <div class="home-strip">
     <div class="strip-item"><div class="st">MegaSquirt 2</div><div class="sd">Tu primera programable. Base del curso básico.</div></div>
     <div class="strip-item"><div class="st">MegaSquirt 3 mini</div><div class="sd">Más entradas y salidas, formato compacto.</div></div>
     <div class="strip-item"><div class="st">MegaSquirt 3 Pro</div><div class="sd">Dual core. Protagonista del avanzado.</div></div>
     <div class="strip-item"><div class="st">Soporte de fábrica</div><div class="sd">¿Tenés dudas? Te respondemos por WhatsApp.</div></div>
   </div>`;
  document.getElementById('sidebar').innerHTML=`<div style="padding:20px;color:var(--muted);font-size:14px">Elegí un curso arriba para ver el temario.</div>`;
}

function openCourse(cid){state.course=cid;state.lesson=null;
  document.getElementById('tab-basico').classList.toggle('active',cid==='basico');
  document.getElementById('tab-avanzado').classList.toggle('active',cid==='avanzado');
  const first=allLessons(cid)[0];state.lesson=first;renderSidebar();renderLesson();
  document.body.classList.remove('nav-open');
}
function openLesson(id){const l=allLessons(state.course).find(x=>x.id===id);if(!l)return;state.lesson=l;renderSidebar();renderLesson();document.body.classList.remove('nav-open');}
function toggleDone(id){if(!progress[state.course])progress[state.course]={};progress[state.course][id]=!progress[state.course][id];saveProg(progress);renderSidebar();renderLesson();}
function resetCourse(){if(!confirm('¿Reiniciar tu progreso de este curso?'))return;progress[state.course]={};saveProg(progress);renderSidebar();renderLesson();}
function goHome(){state.course=null;state.lesson=null;document.getElementById('tab-basico').classList.remove('active');document.getElementById('tab-avanzado').classList.remove('active');renderHome();document.body.classList.remove('nav-open');}

document.getElementById('brandLogo').src=LOGO;
renderHome();
</script>
</body>
